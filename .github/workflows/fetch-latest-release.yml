on:
  repository_dispatch:
    types:
    - release
  
jobs:
  publishRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Request All Releases
        id: requestAllReleases
        run: |
          curl \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.PUBLIC_RELEASE_TOKEN }}" \
          https://api.github.com/repos/Pirate-MIDI/Scribble/releases -o release.json
          
      - name: JSON to Variables Release
        uses: antifree/json-to-variables@v1.0.1
        with:
          filename: 'release.json'
          prefix: release
          
      - name: Create New Assets Folder
        run: mkdir ./assets
        
      - name: Download Release Assets
        if: contains(env.release_0_name, 'alpha') != true && contains(env.release_0_name, 'diagnostic') != true
        id: downloadAssets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'Pirate-MIDI/Scribble'
          version: 'tags/${{env.release_0_tag_name}}'
          file: "scribble"
          regex: true
          target: 'assets/'
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          
      - name: Echo Downloaded Assets
        run: ls assets
        
      - name: Create Mirror Release
        if: contains(env.release_0_name, 'alpha') != true && contains(env.release_0_name, 'diagnostic') != true
        id: createRelease
        env:
          BODY: ${{ env.release_0_body }}
          TAG: ${{ env.release_0_tag_name }}
          NAME: ${{ env.release_0_name }}
          PRERELEASE: ${{ env.release_0_prerelease }}
        run: |
          payload=$(jq -n \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg body "$BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{
              tag_name: $tag,
              target_commitish: "main",
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              generate_release_notes: false
            }')
          curl \
          -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.PUBLIC_RELEASE_TOKEN }}" \
          https://api.github.com/repos/Pirate-MIDI/Pirate-MIDI-Scribble/releases \
          -d "$payload" -o newRelease.json
          
      - name: JSON to Variables New Release
        uses: antifree/json-to-variables@v1.0.1
        with:
          filename: 'newRelease.json'
          prefix: newRelease
      - name: Debug New Release
        run: |
          echo "New release tag: ${{env.newRelease_tag_name}}"
          cat newRelease.json
          
      - name: Upload Release Assets
        if: contains(env.release_0_name, 'alpha') != true && contains(env.release_0_name, 'diagnostic') != true
        run: |
          for asset in assets/*.bin assets/*.json; do
            [ -f "$asset" ] || continue
            filename=$(basename "$asset")
            echo "Uploading $filename..."
            curl -X POST \
              -H "Authorization: token ${{ secrets.PUBLIC_RELEASE_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/Pirate-MIDI/Pirate-MIDI-Scribble/releases/${{ env.newRelease_id }}/assets?name=${filename}" \
              --data-binary @"$asset"
            echo ""
          done

      - name: Debug
        run: |
          echo "Tag: ${{env.release_0_tag_name}}"
          echo "Name: ${{env.release_0_name}}"
          cat release.json
          ls -la assets/
